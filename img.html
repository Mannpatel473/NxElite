
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova — AI Chatbot</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --bg: #0e0e11;
    --bg-elevated: #16161a;
    --card: #1c1c22;
    --border: #2a2a33;
    --fg: #eaeaea;
    --fg-muted: #7a7a8a;
    --accent: #e8a832;
    --accent-dim: rgba(232, 168, 50, 0.12);
    --accent-glow: rgba(232, 168, 50, 0.25);
    --user-bubble: #2a2520;
    --bot-bubble: #1e1e26;
    --success: #34d399;
    --danger: #f87171;
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* Animated background */
  #bg-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  .bg-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
    animation: orbFloat 12s ease-in-out infinite alternate;
  }
  .bg-orb.orb1 {
    width: 500px; height: 500px;
    background: var(--accent);
    top: -150px; right: -100px;
    opacity: 0.08;
    animation-duration: 15s;
  }
  .bg-orb.orb2 {
    width: 400px; height: 400px;
    background: #d94f30;
    bottom: -200px; left: -100px;
    opacity: 0.06;
    animation-duration: 18s;
    animation-delay: -5s;
  }
  .bg-orb.orb3 {
    width: 300px; height: 300px;
    background: var(--accent);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0.04;
    animation-duration: 20s;
    animation-delay: -10s;
  }

  @keyframes orbFloat {
    0% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(30px, -40px) scale(1.1); }
    100% { transform: translate(-20px, 30px) scale(0.95); }
  }

  /* Main layout */
  .app-container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 820px;
    margin: 0 auto;
    padding: 0 16px;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 0;
    flex-shrink: 0;
  }

  .logo-group {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-icon {
    width: 46px; height: 46px;
    background: linear-gradient(135deg, var(--accent), #d94f30);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: #fff;
    box-shadow: 0 4px 20px var(--accent-glow);
    position: relative;
    overflow: hidden;
  }
  .logo-icon::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.2));
    border-radius: inherit;
  }

  .logo-text h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1;
  }
  .logo-text span {
    font-size: 12px;
    color: var(--fg-muted);
    font-weight: 400;
    letter-spacing: 0.5px;
  }

  .header-actions {
    display: flex;
    gap: 8px;
  }

  .icon-btn {
    width: 40px; height: 40px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--fg-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    transition: all 0.25s ease;
  }
  .icon-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
    transform: translateY(-1px);
  }

  /* Status bar */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    margin-bottom: 16px;
    flex-shrink: 0;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 8px rgba(52, 211, 153, 0.5);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.85); }
  }
  .status-bar span {
    font-size: 13px;
    color: var(--fg-muted);
  }
  .status-bar .model-tag {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    background: var(--accent-dim);
    padding: 3px 8px;
    border-radius: 6px;
  }

  /* Chat area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0 16px;
    scroll-behavior: smooth;
    mask-image: linear-gradient(to bottom, transparent 0%, black 3%, black 97%, transparent 100%);
    -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 3%, black 97%, transparent 100%);
  }
  .chat-area::-webkit-scrollbar { width: 5px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

  /* Messages */
  .message {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    animation: msgIn 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
    opacity: 0;
  }
  .message.user { flex-direction: row-reverse; }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-avatar {
    width: 36px; height: 36px;
    border-radius: 10px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    margin-top: 2px;
  }
  .message.bot .msg-avatar {
    background: linear-gradient(135deg, var(--accent), #d94f30);
    color: #fff;
    box-shadow: 0 2px 12px var(--accent-glow);
  }
  .message.user .msg-avatar {
    background: var(--border);
    color: var(--fg-muted);
  }

  .msg-content {
    max-width: 72%;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .msg-bubble {
    padding: 14px 18px;
    border-radius: var(--radius);
    font-size: 14.5px;
    line-height: 1.65;
    word-break: break-word;
  }
  .message.bot .msg-bubble {
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }
  .message.user .msg-bubble {
    background: var(--user-bubble);
    border: 1px solid rgba(232, 168, 50, 0.15);
    border-top-right-radius: 4px;
    color: var(--fg);
  }

  .msg-time {
    font-size: 11px;
    color: var(--fg-muted);
    padding: 0 4px;
    opacity: 0.7;
  }
  .message.user .msg-time { text-align: right; }

  .msg-bubble code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    background: rgba(255,255,255,0.06);
    padding: 2px 7px;
    border-radius: 5px;
    color: var(--accent);
  }
  .msg-bubble strong { color: var(--accent); font-weight: 600; }
  .msg-bubble ul, .msg-bubble ol {
    padding-left: 18px;
    margin: 6px 0;
  }
  .msg-bubble li { margin-bottom: 4px; }

  /* Typing indicator */
  .typing-indicator {
    display: none;
    gap: 12px;
    margin-bottom: 20px;
    animation: msgIn 0.3s ease both;
  }
  .typing-indicator.active { display: flex; }
  .typing-dots {
    display: flex;
    gap: 5px;
    padding: 16px 20px;
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    border-top-left-radius: 4px;
  }
  .typing-dots span {
    width: 8px; height: 8px;
    background: var(--fg-muted);
    border-radius: 50%;
    animation: dotBounce 1.4s ease-in-out infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes dotBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-8px); opacity: 1; }
  }

  /* Quick replies */
  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
    animation: msgIn 0.4s cubic-bezier(0.22, 1, 0.36, 1) 0.2s both;
    opacity: 0;
  }
  .quick-btn {
    padding: 9px 16px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--fg-muted);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.25s ease;
    white-space: nowrap;
  }
  .quick-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
    transform: translateY(-2px);
    box-shadow: 0 4px 16px var(--accent-glow);
  }

  /* Input area */
  .input-area {
    flex-shrink: 0;
    padding: 16px 0 24px;
  }

  .input-wrapper {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 8px 8px 18px;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
  }
  .input-wrapper:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim), 0 8px 32px rgba(0,0,0,0.3);
  }

  #chat-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--fg);
    font-family: inherit;
    font-size: 15px;
    line-height: 1.5;
    resize: none;
    max-height: 120px;
    min-height: 24px;
    padding: 6px 0;
  }
  #chat-input::placeholder { color: var(--fg-muted); opacity: 0.6; }

  .send-btn {
    width: 44px; height: 44px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, var(--accent), #d94f30);
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    transition: all 0.25s ease;
    box-shadow: 0 2px 12px var(--accent-glow);
  }
  .send-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 4px 24px var(--accent-glow);
  }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .input-hint {
    text-align: center;
    margin-top: 10px;
    font-size: 11px;
    color: var(--fg-muted);
    opacity: 0.5;
  }

  /* Toast */
  .toast {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--fg);
    padding: 12px 24px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    z-index: 999;
    transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Date divider */
  .date-divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 24px 0 20px;
    animation: msgIn 0.4s ease both;
  }
  .date-divider::before,
  .date-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .date-divider span {
    font-size: 11px;
    color: var(--fg-muted);
    white-space: nowrap;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* Responsive */
  @media (max-width: 640px) {
    .msg-content { max-width: 85%; }
    .logo-text h1 { font-size: 18px; }
    .quick-replies { gap: 6px; }
    .quick-btn { font-size: 12px; padding: 7px 12px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>

<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<div class="bg-orb orb3"></div>
<canvas id="bg-canvas"></canvas>

<div class="toast" id="toast"></div>

<div class="app-container">
  <!-- Header -->
  <header>
    <div class="logo-group">
      <div class="logo-icon"><i class="fas fa-bolt"></i></div>
      <div class="logo-text">
        <h1>Nova</h1>
        <span>Intelligent Assistant</span>
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="btn-clear" title="Clear chat" aria-label="Clear chat">
        <i class="fas fa-trash-can"></i>
      </button>
      <button class="icon-btn" id="btn-export" title="Export chat" aria-label="Export chat">
        <i class="fas fa-download"></i>
      </button>
    </div>
  </header>

  <!-- Status bar -->
  <div class="status-bar">
    <div class="status-dot"></div>
    <span>Online and ready</span>
    <span class="model-tag">nova-3.0-local</span>
  </div>

  <!-- Chat area -->
  <div class="chat-area" id="chat-area" role="log" aria-live="polite">
    <!-- Messages render here -->
  </div>

  <!-- Typing indicator -->
  <div class="typing-indicator" id="typing-indicator">
    <div class="msg-avatar" style="background:linear-gradient(135deg,var(--accent),#d94f30);color:#fff;box-shadow:0 2px 12px var(--accent-glow);width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;">
      <i class="fas fa-bolt"></i>
    </div>
    <div class="typing-dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- Quick replies -->
  <div class="quick-replies" id="quick-replies"></div>

  <!-- Input area -->
  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="chat-input" rows="1" placeholder="Ask Nova anything..." aria-label="Type your message"></textarea>
      <button class="send-btn" id="send-btn" disabled aria-label="Send message">
        <i class="fas fa-arrow-up"></i>
      </button>
    </div>
    <div class="input-hint">Press Enter to send, Shift+Enter for new line</div>
  </div>
</div>

<script>
// ============================================
// Background particle system
// ============================================
(function initParticles() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  const PARTICLE_COUNT = 60;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  class Particle {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height;
      this.size = Math.random() * 1.5 + 0.5;
      this.speedX = (Math.random() - 0.5) * 0.3;
      this.speedY = (Math.random() - 0.5) * 0.3;
      this.opacity = Math.random() * 0.3 + 0.05;
      this.pulse = Math.random() * Math.PI * 2;
    }
    update() {
      this.x += this.speedX;
      this.y += this.speedY;
      this.pulse += 0.01;
      if (this.x < -10 || this.x > canvas.width + 10 || this.y < -10 || this.y > canvas.height + 10) {
        this.reset();
      }
    }
    draw() {
      const o = this.opacity * (0.6 + 0.4 * Math.sin(this.pulse));
      ctx.beginPath();
      ctx.arc(this.x, this.y, Math.max(0.1, this.size), 0, Math.PI * 2);
      ctx.fillStyle = `rgba(232,168,50,${o})`;
      ctx.fill();
    }
  }

  for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(animate);
  }
  animate();
})();

// ============================================
// Chat logic
// ============================================
const chatArea = document.getElementById('chat-area');
const input = document.getElementById('chat-input');
const sendBtn = document.getElementById('send-btn');
const typingIndicator = document.getElementById('typing-indicator');
const quickRepliesEl = document.getElementById('quick-replies');
const toastEl = document.getElementById('toast');

let chatHistory = [];
let isTyping = false;

// Format time
function getTime() {
  const now = new Date();
  return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

// Show toast notification
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 2500);
}

// Auto-resize textarea
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  sendBtn.disabled = input.value.trim() === '';
});

// Send on Enter, newline on Shift+Enter
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (input.value.trim() && !isTyping) sendMessage();
  }
});

sendBtn.addEventListener('click', () => {
  if (input.value.trim() && !isTyping) sendMessage();
});

// Add a message to the chat
function addMessage(text, sender) {
  const msg = { text, sender, time: getTime() };
  chatHistory.push(msg);

  const div = document.createElement('div');
  div.className = `message ${sender}`;
  div.setAttribute('role', 'article');

  const avatarIcon = sender === 'bot' ? 'fa-bolt' : 'fa-user';
  div.innerHTML = `
    <div class="msg-avatar"><i class="fas ${avatarIcon}"></i></div>
    <div class="msg-content">
      <div class="msg-bubble">${formatText(text)}</div>
      <div class="msg-time">${msg.time}</div>
    </div>
  `;
  chatArea.appendChild(div);
  scrollToBottom();
}

// Basic text formatting
function formatText(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/\n/g, '<br>');
}

// Scroll chat to bottom
function scrollToBottom() {
  requestAnimationFrame(() => {
    chatArea.scrollTop = chatArea.scrollHeight;
  });
}

// Show/hide typing indicator
function showTyping() {
  isTyping = true;
  typingIndicator.classList.add('active');
  scrollToBottom();
}
function hideTyping() {
  isTyping = false;
  typingIndicator.classList.remove('active');
}

// Show quick reply suggestions
function showQuickReplies(replies) {
  quickRepliesEl.innerHTML = '';
  replies.forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'quick-btn';
    btn.textContent = r;
    btn.addEventListener('click', () => {
      if (!isTyping) {
        quickRepliesEl.innerHTML = '';
        input.value = r;
        sendBtn.disabled = false;
        sendMessage();
      }
    });
    quickRepliesEl.appendChild(btn);
  });
}

// ============================================
// Chatbot brain — pattern matching + context
// ============================================
const botResponses = {
  greetings: {
    patterns: [/^(hi|hello|hey|howdy|hola|yo|sup|greetings|good\s?(morning|afternoon|evening))/i],
    replies: [
      "Hey there! Great to have you here. What's on your mind?",
      "Hello! I'm Nova, your AI assistant. How can I help you today?",
      "Hi! Ready to chat about anything you'd like. What's up?",
      "Hey! Welcome back. What can I do for you?",
    ],
    followUp: ["Tell me a joke", "What can you do?", "How are you?"]
  },

  howAreYou: {
    patterns: [/how\s*(are|r)\s*(you|u|ya)|how(?:'s| is) it going|what'?s up/i],
    replies: [
      "I'm running at full capacity and feeling great! Thanks for asking. What about you?",
      "Doing excellent — all systems nominal. How can I make your day better?",
      "I'm just a bunch of code having a great time! What can I help you with?",
    ],
    followUp: ["I'm good thanks", "Not great honestly", "Let's get to work"]
  },

  capabilities: {
    patterns: [/what\s*(can|do)\s*(you|u)\s*(do)?|capabilities|features|help\s*me|what\s*do\s*you\s*know/i],
    replies: [
      "Here's what I can help with:\n\n- **General knowledge** — science, history, tech, and more\n- **Creative writing** — stories, poems, brainstorming\n- **Coding help** — explain concepts, review logic, suggest approaches\n- **Math & logic** — calculations, puzzles, reasoning\n- **Conversational** — chat, advice, motivation\n\nJust ask me anything!",
      "I'm a versatile assistant! I can answer questions, help you think through problems, write creatively, explain complex topics simply, and have meaningful conversations. Try me!",
    ],
    followUp: ["Tell me a fun fact", "Write a poem", "Help me with code"]
  },

  jokes: {
    patterns: [/(tell\s*me\s*)?a\s*joke|something\s*funny|make\s*me\s*laugh|humor/i],
    replies: [

// Find the best matching response category
function findResponse(input) {
  const text = input.trim();
  if (!text) return null;

  for (const [key, category] of Object.entries(botResponses)) {
    for (const pattern of category.patterns) {
      if (pattern.test(text)) {
        const replies = category.replies;
        const reply = replies[Math.floor(Math.random() * replies.length)];
        const followUp = category.followUp || [];
        return { reply, followUp };
      }
    }
  }
  return null;
}

// Send a message
function sendMessage() {
  const text = input.value.trim();
  if (!text || isTyping) return;

  addMessage(text, 'user');
  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;
  quickRepliesEl.innerHTML = '';

  // Show typing indicator with variable delay
  showTyping();
  const response = findResponse(text);
  const delay = Math.min(600 + response.reply.length * 8, 2500);

  setTimeout(() => {
    hideTyping();
    if (response) {
      addMessage(response.reply, 'bot');
      if (response.followUp.length > 0) {
        setTimeout(() => showQuickReplies(response.followUp), 300);
      }
    } else {
      addMessage("I'm not sure how to respond to that. Try asking me something else!", 'bot');
    }
  }, delay);
}

// Clear chat
document.getElementById('btn-clear').addEventListener('click', () => {
  chatArea.innerHTML = '';
  chatHistory = [];
  quickRepliesEl.innerHTML = '';
  showToast('Chat cleared');
  initChat();
});

// Export chat
document.getElementById('btn-export').addEventListener('click', () => {
  if (chatHistory.length === 0) {
    showToast('Nothing to export');
    return;
  }
  let text = 'Nova Chat Export\n' + '='.repeat(40) + '\n\n';
  chatHistory.forEach(m => {
    const label = m.sender === 'user' ? 'You' : 'Nova';
    text += `[${m.time}] ${label}:\n${m.text}\n\n`;
  });
  const blob = new Blob([text], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `nova-chat-${Date.now()}.txt`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Chat exported successfully');
});

// Initialize chat with welcome message
function initChat() {
  const now = new Date();
  const dateStr = now.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });

  const divider = document.createElement('div');
  divider.className = 'date-divider';
  divider.innerHTML = `<span>${dateStr}</span>`;
  chatArea.appendChild(divider);

  setTimeout(() => {
    addMessage("Hey, I'm **Nova** — your local AI assistant. I run entirely in your browser with zero data leaving your device.\n\nI can chat about science, philosophy, coding, math, creative writing, and a lot more. Or just keep you company!\n\nWhat would you like to talk about?", 'bot');
    setTimeout(() => {
      showQuickReplies(["What can you do?", "Tell me a fun fact", "Tell me a joke", "Explain quantum physics"]);
    }, 400);
  }, 500);
}
